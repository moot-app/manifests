apiVersion: v1
kind: ConfigMap
metadata:
  name: postiz-redis-configuration
  labels:
    app.kubernetes.io/name: postiz-redis
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: postiz
data:
  redis.conf: |-
    dir /data
    appendonly yes
    save ""
    rename-command FLUSHDB ""
    rename-command FLUSHALL ""
