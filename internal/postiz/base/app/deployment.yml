apiVersion: apps/v1
kind: Deployment
metadata:
  name: postiz
  labels:
    app.kubernetes.io/name: postiz
    app.kubernetes.io/instance: postiz
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: postiz
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: postiz
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postiz
        app.kubernetes.io/instance: postiz
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: postiz
    spec:
      serviceAccountName: postiz
      containers:
        - name: postiz
          image: ghcr.io/gitroomhq/postiz-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: postiz-config
            - secretRef:
                name: postiz-secrets
          volumeMounts:
            - name: uploads
              mountPath: /uploads
          resources:
            requests:
              cpu: 10m
              memory: 512Mi
            limits:
              memory: 4096Mi
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: postiz-uploads
